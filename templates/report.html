{% extends "base.html" %}
{% block title %}Report — Licence Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h2>📋 Licence Report</h2>
    <p>All tables computed per software. Keystore appears under each software's tables.</p>
</div>

<!-- Software Tabs -->
<div style="display:flex; gap:4px; margin-bottom:24px;
            border-bottom:2px solid #E5E7EB; padding-bottom:0;">
    <div id="swTabs" style="display:flex; gap:4px;"></div>
</div>

<!-- Tab Content -->
<div id="tabContent"></div>

<!-- Bottom Actions -->
<div style="display:flex; gap:12px; margin-top:24px; flex-wrap:wrap;">
    <button class="btn btn-primary" onclick="downloadAll()">
        ⬇️ Download All
    </button>
    <a href="/dashboard" class="btn btn-ghost">
        ← Back to Dashboard
    </a>
</div>
{% endblock %}

{% block scripts %}
<script>
let activeSw         = null;
let allTableData     = {};   // {sw: {t1, t2, t3, t4}}
let keystoreRegistry = {};   // {sw: {developer, keys:[...]}}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
    const software = getSoftware();
    if (!software || software.length === 0) {
        window.location.href = '/dashboard';
        return;
    }

    renderTabs(software);
    await loadAllData(software);
    await loadKeystore(software);
    switchTab(software[0]);
});

// ─────────────────────────────────────────────
// RENDER TABS
// ─────────────────────────────────────────────

function renderTabs(software) {
    const container = document.getElementById('swTabs');
    container.innerHTML = software.map((sw, i) => `
        <button id="tab_${sw}"
                onclick="switchTab('${sw}')"
                style="padding:10px 20px; border:none; cursor:pointer;
                       font-size:13px; font-weight:600;
                       background:${i === 0 ? 'white' : 'transparent'};
                       color:${i === 0 ? '#2563EB' : '#6B7280'};
                       border-bottom:${i === 0 ? '2px solid #2563EB' : '2px solid transparent'};
                       margin-bottom:-2px; transition:all 0.15s;">
            🖥️ ${sw}
            <span id="tabstatus_${sw}"
                  style="margin-left:6px; font-size:10px;
                         background:#E5E7EB; color:#6B7280;
                         padding:2px 6px; border-radius:10px;">
                Loading...
            </span>
        </button>
    `).join('');
}

// ─────────────────────────────────────────────
// SWITCH TAB
// ─────────────────────────────────────────────

function switchTab(sw) {
    const software = getSoftware();
    software.forEach(s => {
        const tab = document.getElementById(`tab_${s}`);
        if (!tab) return;
        const isActive = s === sw;
        tab.style.color        = isActive ? '#2563EB' : '#6B7280';
        tab.style.background   = isActive ? 'white'   : 'transparent';
        tab.style.borderBottom = isActive ? '2px solid #2563EB' : '2px solid transparent';
    });

    activeSw = sw;

    const data = allTableData[sw];
    if (!data) {
        document.getElementById('tabContent').innerHTML = `
            <div class="alert alert-info">Loading data for ${sw}...</div>`;
        return;
    }
    renderTabContent(sw, data);
}

// ─────────────────────────────────────────────
// LOAD ALL TABLE DATA
// ─────────────────────────────────────────────

async function loadAllData(software) {
    const sid       = getSessionId();
    const allInputs = Session.get('inputs') || {};

    for (const sw of software) {
        const inputs = allInputs[sw] || {annual:0, advent:0, onshore:0};

        const p1 = new URLSearchParams({session_id: sid, software: sw, annual: inputs.annual, advent: inputs.advent});
        const d1 = await apiFetch(`/tables/table1?${p1}`);

        const p2 = new URLSearchParams({session_id: sid, software: sw, advent: inputs.advent, onshore: inputs.onshore});
        const d2 = await apiFetch(`/tables/table2?${p2}`);

        const p3 = new URLSearchParams({session_id: sid, software: sw, annual: inputs.annual, advent: inputs.advent, onshore: inputs.onshore});
        const d3 = await apiFetch(`/tables/table3?${p3}`);

        const p4 = new URLSearchParams({session_id: sid, software: sw});
        const d4 = await apiFetch(`/tables/table4?${p4}`);

        allTableData[sw] = {
            t1: d1?.success ? d1.data : [],
            t2: d2?.success ? d2.data : {},
            t3: d3?.success ? d3.data : {},
            t4: d4?.success ? d4.data : {},
        };

        const badge = document.getElementById(`tabstatus_${sw}`);
        if (badge) {
            badge.textContent      = '✅';
            badge.style.background  = '#ECFDF5';
            badge.style.color       = '#059669';
        }
    }
}

// ─────────────────────────────────────────────
// LOAD KEYSTORE REGISTRY (GET — correct method)
// ─────────────────────────────────────────────

async function loadKeystore(software) {
    const sid = getSessionId();
    const params = new URLSearchParams({session_id: sid, software: software.join(',')});
    const data   = await apiFetch(`/keystore/table?${params}`);
    keystoreRegistry = (data?.success ? data.data : {}) || {};
}

// ─────────────────────────────────────────────
// RENDER TAB CONTENT (tables + keystore for this sw)
// ─────────────────────────────────────────────

function renderTabContent(sw, data) {
    const container = document.getElementById('tabContent');
    container.innerHTML = `
        <div id="t1_${sw}_wrap" class="card">
            <div class="card-title" style="margin:0 0 16px">📊 Licence Summary</div>
            <div id="t1_${sw}"></div>
        </div>
        <div id="t2_${sw}_wrap" class="card">
            <div class="card-title" style="margin:0 0 16px">📋 Department Lease Distribution</div>
            <div id="t2_${sw}"></div>
        </div>
        <div id="t3_${sw}_wrap" class="card">
            <div class="card-title" style="margin:0 0 16px">🔢 Sub Location Breakups</div>
            <div id="t3_${sw}"></div>
        </div>
        <div id="t4_${sw}_wrap" class="card">
            <div class="card-title" style="margin:0 0 16px">🏦 ISL — Dept Wise Breakdown</div>
            <div id="t4_${sw}"></div>
        </div>
        <div id="keystore_${sw}_wrap"></div>
    `;

    // Table 1
    renderTable(`t1_${sw}`,
        ['Developer', 'Software', 'Total Lic', 'Own Lic', 'Lease Lic', 'Annual', 'Advent', 'Order'],
        data.t1.map(r => ({
            developer: r.developer, software: r.software,
            total_lic: r.total_lic, own_lic: r.own_lic,
            lease_lic: r.lease_lic, annual: r.annual,
            advent: r.advent, order: r.order_lic,
        }))
    );

    // Table 2
    const t2rows = [];
    Object.entries(data.t2).forEach(([s, d]) =>
        d.rows.forEach(r => t2rows.push({category: r.label, description: r.description || '', value: r.value}))
    );
    renderTable(`t2_${sw}`, ['Category', 'Description', 'Value'], t2rows);

    // Table 3
    const t3rows = [];
    Object.entries(data.t3).forEach(([s, d]) =>
        d.rows.forEach(r => t3rows.push({category: r.label, value: r.value}))
    );
    renderTable(`t3_${sw}`, ['Category', 'Value'], t3rows);

    // Table 4
    const t4rows = [];
    Object.entries(data.t4).forEach(([s, d]) =>
        d.rows.forEach(r => t4rows.push({dept: r.dept, ltm: r.ltm, share: r.share, total: r.total}))
    );
    renderTable(`t4_${sw}`, ['Dept', 'LTM', 'Share', 'Total'], t4rows);

    // Keystore for this software
    renderKeystoreForTab(sw);
}

// ─────────────────────────────────────────────
// DERIVE LABEL → AVAILABLE VALUE  (from this sw's tables)
// ─────────────────────────────────────────────

function deriveAvailable(sw) {
    const data  = allTableData[sw] || {};
    const avail = {};
    const put = (label, v) => {
        if (label === undefined || label === null) return;
        if (typeof v === 'number' && !isNaN(v)) avail[String(label).toUpperCase()] = v;
    };

    // Licence Summary (t1)
    const r1 = (data.t1 || []).find(r => r.software === sw) || (data.t1 || [])[0];
    if (r1) {
        put('ORDER',  r1.order_lic);
        put('ADVENT', r1.advent);
        put('ANNUAL', r1.annual);
        put('LEASE',  r1.lease_lic);
        put('OWN',    r1.own_lic);
    }
    // Required (t3) first…
    const d3 = (data.t3 || {})[sw];
    if (d3) d3.rows.forEach(r => put(r.label, r.value));
    // …then Allocated (t2) wins on overlap (e.g. PP), matching existing behaviour
    const d2 = (data.t2 || {})[sw];
    if (d2) d2.rows.forEach(r => put(r.label, r.value));

    return avail;
}

function getOrder(sw) {
    const r1 = (allTableData[sw]?.t1 || []).find(r => r.software === sw) || (allTableData[sw]?.t1 || [])[0];
    return r1 ? Number(r1.order_lic) || 0 : 0;
}

// id helpers — use ~~ separator so labels/keys with underscores are safe
function kvalId(sw, label, keyId) { return `kval_${sw}~~${label}~~${keyId}`; }

// ─────────────────────────────────────────────
// RENDER KEYSTORE (per software, grouped by label, all editable)
// ─────────────────────────────────────────────

function renderKeystoreForTab(sw) {
    const wrap = document.getElementById(`keystore_${sw}_wrap`);
    if (!wrap) return;

    const reg   = keystoreRegistry[sw];
    const avail = deriveAvailable(sw);
    const saved = JSON.parse(sessionStorage.getItem('keystore_values_temp') || '{}');
    const savedSw = saved[sw] || {};

    // Group keys by label
    const groups = {};
    (reg?.keys || []).forEach(k => {
        (groups[k.label] = groups[k.label] || []).push(k);
    });

    // Build datalist of labels (table-derived + existing registry) for Add Key
    const labelOptions = Array.from(new Set([
        ...Object.keys(avail),
        ...Object.keys(groups),
        'PP','NPP','CV','CEC','VEC','VALDEL','ADVENT','ONSHORE',
    ]));

    let html = `
    <div class="card" id="keystoreCard_${sw}">
        <div class="card-title" style="margin:0 0 4px">🔑 Keystore — ${sw}</div>
        <p style="margin:0 0 16px; font-size:12px; color:#6B7280;">
            Values shown as <b>Available</b> come from the tables above. Every key value is editable.
        </p>`;

    if (!reg || (reg.keys || []).length === 0) {
        html += `<div class="alert alert-info">No keys defined yet. Add one below.</div>`;
    } else {
        Object.entries(groups).forEach(([label, keys]) => {
            const availVal = avail[label.toUpperCase()];
            const availTxt = (availVal === undefined)
                ? '<span style="color:#9CA3AF;">— (not in tables)</span>'
                : `<b>${availVal}</b>`;
            const single = keys.length === 1;

            html += `
            <div class="ks-group" data-sw="${sw}" data-label="${label}"
                 data-avail="${availVal === undefined ? '' : availVal}"
                 style="border:1px solid #E5E7EB; border-radius:8px; padding:12px 14px; margin-bottom:12px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <div style="font-weight:700; color:#1A2B4A; font-size:14px;">${label}</div>
                    <div style="font-size:12px; color:#374151;">
                        Available (from tables): ${availTxt}
                        <span class="ks-group-sum" style="margin-left:10px; color:#6B7280;"></span>
                    </div>
                </div>
                <table style="width:100%;"><thead><tr>
                    <th style="text-align:left;">Key ID</th>
                    <th style="width:90px;">Active</th>
                    <th style="width:140px;">Value</th>
                </tr></thead><tbody>`;

            keys.forEach(k => {
                let preset = '';
                if (savedSw[label] && savedSw[label][k.key_id] !== undefined) {
                    preset = savedSw[label][k.key_id];
                } else if (single && availVal !== undefined) {
                    preset = availVal;
                }
                html += `
                <tr>
                    <td style="font-family:monospace; font-size:12px;">${k.key_id}</td>
                    <td style="text-align:center;">
                        <label class="toggle">
                            <input type="checkbox" ${k.active ? 'checked' : ''}
                                   onchange="toggleKeyInline('${sw}','${label}','${k.key_id}',this)">
                            <span class="toggle-slider"></span>
                        </label>
                    </td>
                    <td>
                        <input type="number" step="any" class="edit-cell ks-val"
                               id="${kvalId(sw, label, k.key_id)}"
                               data-sw="${sw}" data-label="${label}"
                               value="${preset}" placeholder="${availVal !== undefined ? availVal : 'value'}"
                               oninput="recomputeKeystore('${sw}')"
                               style="width:120px; padding:4px 8px; border:1px solid #2563EB;
                                      border-radius:4px; background:#EFF6FF; font-size:13px;">
                    </td>
                </tr>`;
            });

            html += `</tbody></table></div>`;
        });
    }

    // Validation summary + Add Key + Save
    html += `
        <div id="ksValidation_${sw}"
             style="margin:8px 0 16px; font-size:13px; font-weight:600;"></div>

        <div style="display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap;
                    border-top:1px solid #E5E7EB; padding-top:14px; margin-top:4px;">
            <div>
                <label style="display:block; font-size:11px; color:#6B7280; margin-bottom:3px;">Label / Dept</label>
                <input list="ksLabels_${sw}" id="addLabel_${sw}" placeholder="e.g. PP"
                       style="width:130px; padding:6px 8px; border:1px solid #D1D5DB; border-radius:4px; font-size:13px;">
                <datalist id="ksLabels_${sw}">
                    ${labelOptions.map(l => `<option value="${l}">`).join('')}
                </datalist>
            </div>
            <div>
                <label style="display:block; font-size:11px; color:#6B7280; margin-bottom:3px;">New Key ID</label>
                <input id="addKeyId_${sw}" placeholder="e.g. KEY_010"
                       style="width:150px; padding:6px 8px; border:1px solid #D1D5DB; border-radius:4px; font-size:13px;">
            </div>
            <button class="btn btn-outline btn-sm" onclick="addKeyInline('${sw}')">➕ Add Key</button>
            <button class="btn btn-navy btn-sm" onclick="saveKeystoreValues()" style="margin-left:auto;">💾 Save Values</button>
        </div>
    </div>`;

    wrap.innerHTML = html;
    recomputeKeystore(sw);
}

// ─────────────────────────────────────────────
// LIVE VALIDATION
//   • per-label: sum of keys ≤ Available
//   • global:    sum of all keys ≤ Order
// ─────────────────────────────────────────────

function recomputeKeystore(sw) {
    let grandTotal = 0;
    let anyOver    = false;

    document.querySelectorAll(`#keystoreCard_${sw} .ks-group`).forEach(group => {
        const availRaw = group.dataset.avail;
        const avail    = availRaw === '' ? null : Number(availRaw);
        let sum = 0;
        group.querySelectorAll('.ks-val').forEach(inp => { sum += Number(inp.value) || 0; });
        grandTotal += sum;

        const over = (avail !== null) && (sum > avail + 1e-9);
        if (over) anyOver = true;

        group.style.borderColor = over ? '#DC2626' : '#E5E7EB';
        group.style.background   = over ? '#FFF5F5' : 'transparent';

        const sumEl = group.querySelector('.ks-group-sum');
        if (sumEl) {
            sumEl.textContent = `· entered: ${+sum.toFixed(4)}`;
            sumEl.style.color = over ? '#DC2626' : '#6B7280';
        }
    });

    const order   = getOrder(sw);
    const overall = grandTotal > order + 1e-9;
    const box     = document.getElementById(`ksValidation_${sw}`);
    if (box) {
        if (overall || anyOver) {
            box.style.color = '#DC2626';
            box.innerHTML =
                `⚠️ ${overall ? `Total entered ${+grandTotal.toFixed(4)} exceeds Order ${order}. ` : ''}` +
                `${anyOver ? 'One or more labels exceed their available value.' : ''}`;
        } else {
            box.style.color = '#059669';
            box.innerHTML = `✅ Total entered ${+grandTotal.toFixed(4)} of Order ${order}.`;
        }
    }
    return !(overall || anyOver);
}

// ─────────────────────────────────────────────
// TOGGLE KEY
// ─────────────────────────────────────────────

async function toggleKeyInline(sw, label, keyId, checkbox) {
    const params = new URLSearchParams({software: sw, dept: label, key_id: keyId});
    const data   = await apiFetch(`/keystore/keys/toggle?${params}`, {method: 'POST'});
    if (!data?.success) {
        checkbox.checked = !checkbox.checked;
        toast('Failed to toggle key', 'error');
        return;
    }
    // keep local registry in sync
    (keystoreRegistry[sw]?.keys || []).forEach(k => {
        if (k.label === label && k.key_id === keyId) k.active = checkbox.checked;
    });
    toast(`${keyId} ${checkbox.checked ? 'activated ✅' : 'deactivated'}`,
          checkbox.checked ? 'success' : 'warn');
}

// ─────────────────────────────────────────────
// ADD KEY  (was missing — now wired to /keystore/keys/add)
// ─────────────────────────────────────────────

async function addKeyInline(sw) {
    const label = (document.getElementById(`addLabel_${sw}`).value || '').trim();
    const keyId = (document.getElementById(`addKeyId_${sw}`).value || '').trim();

    if (!label || !keyId) { toast('Enter both a label and a key ID', 'warn'); return; }

    const params = new URLSearchParams({
        session_id: getSessionId(), software: sw, dept: label, key_id: keyId, active: true,
    });
    const data = await apiFetch(`/keystore/keys/add?${params}`, {method: 'POST'});

    if (!data?.success) { toast(data?.message || 'Could not add key', 'error'); return; }

    toast(`Key '${keyId}' added to ${label}`, 'success');
    saveKeystoreValues(true);                 // preserve current inputs
    await loadKeystore(getSoftware());        // refresh registry
    renderKeystoreForTab(sw);                 // re-render keystore only
}

// ─────────────────────────────────────────────
// COLLECT / SAVE VALUES  (flows into download → Excel)
// ─────────────────────────────────────────────

function collectKeystoreValues() {
    const userValues = {};
    document.querySelectorAll('.ks-val').forEach(inp => {
        if (inp.value === '') return;
        const sw    = inp.dataset.sw;
        const label = inp.dataset.label;
        const keyId = inp.id.split('~~')[2];
        userValues[sw]               = userValues[sw]              || {};
        userValues[sw][label]        = userValues[sw][label]       || {};
        userValues[sw][label][keyId] = parseFloat(inp.value) || 0;
    });
    // merge with anything saved for other tabs not currently in the DOM
    const existing = JSON.parse(sessionStorage.getItem('keystore_values_temp') || '{}');
    const merged   = {...existing, ...userValues};
    sessionStorage.setItem('keystore_values_temp', JSON.stringify(merged));
    return merged;
}

function saveKeystoreValues(silent) {
    collectKeystoreValues();
    if (!silent) toast('Keystore values saved', 'success');
}

// ─────────────────────────────────────────────
// DOWNLOAD ALL
// ─────────────────────────────────────────────

async function downloadAll() {
    const sid       = getSessionId();
    const software  = getSoftware();
    const allInputs = Session.get('inputs') || {};
    const perSwInputs = {};
    software.forEach(sw => { perSwInputs[sw] = allInputs[sw] || {annual:0, advent:0, onshore:0}; });

    const keystoreValues = collectKeystoreValues();   // fresh, no need to click Save first

    showLoading('Generating Excel report...');
    try {
        const response = await fetch('/download/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                session_id:      sid,
                software:        software,
                per_sw_inputs:   perSwInputs,
                keystore_values: keystoreValues,
            }),
        });

        if (!response.ok) {
            let msg = 'Download failed';
            try { const err = await response.json(); msg = err.detail || msg; } catch(e){}
            toast(msg, 'error'); hideLoading(); return;
        }

        const blob = await response.blob();
        const url  = window.URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = 'licence_report.xlsx';
        document.body.appendChild(a); a.click(); a.remove();
        window.URL.revokeObjectURL(url);
        hideLoading();
        toast('Download complete! ✅', 'success');
    } catch(e) {
        hideLoading();
        toast('Download failed: ' + e.message, 'error');
    }
}
</script>
{% endblock %}
