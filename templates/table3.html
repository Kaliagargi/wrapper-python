{% extends "base.html" %}
{% block title %}Required{% endblock %}

{% block content %}
<div class="page-header">
    <h2> Required Licences</h2>
    <p>Valdel, PP, CEC, VEC breakdown per software.</p>
</div>
<div class="card">
    <div class="card-title">🖥️ Select Software to Display</div>
    <div id="swSelector" style="display:flex; flex-wrap:wrap; gap:12px;">
        <!-- populated by JS -->
    </div>
</div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
        <div class="card-title" style="margin:0">Results</div>
        <div style="display:flex; gap:8px">
            <button class="btn btn-outline btn-sm" onclick="toggleEdit(this)"
                    data-editing="false">Edit</button>
            <button class="btn btn-primary btn-sm" onclick="buildTable()">
                Build Table
            </button>
        </div>
    </div>
    <div id="tableContainer">
        <div class="alert alert-info">
            Click "Build Table" to generate Required Licences.
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let selectedForTable = [];

// ── Load Software Checkboxes ──────────────
function loadSwSelector() {
    const allSw    = getSoftware();
    const saved    = Session.get('selected_for_tables') || allSw;
    selectedForTable = saved;

    const container = document.getElementById('swSelector');
    container.innerHTML = allSw.map(sw => {
        const checked = saved.includes(sw);
        return `
        <label style="display:flex; align-items:center; gap:8px;
                       padding:8px 16px; border-radius:8px;
                       border:1.5px solid ${checked ? '#2563EB' : '#E5E7EB'};
                       background:${checked ? '#EFF6FF' : 'white'};
                       cursor:pointer; font-size:13px; font-weight:600;
                       transition:all 0.15s;" id="swlabel_${sw}">
            <input type="checkbox" ${checked ? 'checked' : ''}
                   onchange="toggleSwForTable('${sw}', this)"
                   style="accent-color:#2563EB; width:15px; height:15px;">
            ${sw}
        </label>`;
    }).join('');
}

// ── Toggle Software for Table ─────────────
function toggleSwForTable(sw, checkbox) {
    const label = document.getElementById(`swlabel_${sw}`);

    if (checkbox.checked) {
        if (!selectedForTable.includes(sw)) selectedForTable.push(sw);
        label.style.borderColor = '#2563EB';
        label.style.background  = '#EFF6FF';
    } else {
        selectedForTable = selectedForTable.filter(s => s !== sw);
        label.style.borderColor = '#E5E7EB';
        label.style.background  = 'white';
    }

    Session.set('selected_for_tables', selectedForTable);
}

async function buildTable() {
    const sid = getSessionId();

    if (!sid || selectedForTable.length === 0) {
        toast('Please select at least one software', 'error');
        return;
    }

    showLoading('Building Required table...');

    const allData = {};

    for (const sw of selectedForTable) {
        const inputs = getInputs(sw);
        const params = new URLSearchParams({
            session_id: sid,
            software:   sw,          
            annual:     inputs.annual,
            advent:     inputs.advent,
            onshore:    inputs.onshore,
        });

        const data = await apiFetch(`/tables/table3?${params}`);

        if (data?.success) {
            Object.assign(allData, data.data);
        }
    }                               

    hideLoading();                   

    const rows = [];                 
    Object.entries(allData).forEach(([sw, swData]) => {
        swData.rows.forEach(r => {
            rows.push({
                software:  sw,
                developer: swData.developer,
                category:  r.label,
                value:     r.value,
            });
        });
    });

    renderTable('tableContainer',
        ['Software', 'Developer', 'Category', 'Value'],
        rows, true
    );
    markDone('table3');
    toast('Required table built!', 'success');
}
document.addEventListener('DOMContentLoaded', loadSwSelector);
</script>
{% endblock %}
